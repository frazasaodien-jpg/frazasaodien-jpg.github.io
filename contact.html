<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver - CookLoc Abidjan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="bg-gray-50">

    <nav class="bg-white/95 backdrop-blur-sm shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="text-2xl font-black text-orange-600 tracking-tighter">COOK<span class="text-gray-800">LOC</span></a>
        <a href="index.html" class="text-gray-600 hover:text-orange-600 font-medium">← Retour à l'accueil</a>
    </nav>

    <section class="py-20 px-6">
        <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-50">
            <div class="bg-gray-900 p-10 text-center text-white">
                <h2 class="text-3xl font-bold mb-2">Finalisez votre demande</h2>
                <p class="text-gray-400">Remplissez ce formulaire pour enregistrer votre réservation.</p>
            </div>

            <form id="contactForm" class="p-10 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nom Complet</label>
                        <input type="text" name="nom" required placeholder="Ex: Deborah Kouassi" 
                               class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-200">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Téléphone</label>
                        <input type="tel" name="telephone" required placeholder="+225 ..." 
                               class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-200">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Type d'événement</label>
                    <select name="evenement" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-200">
                        <option value="Mariage">Mariage de Prestige</option>
                        <option value="Gala">Dîner de Gala</option>
                        <option value="Baptême">Baptême / Anniversaire</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Matériel souhaité</label>
                    <textarea name="materiel" rows="4" placeholder="Ex: 100 assiettes dorées, 100 verres..." 
                              class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-200"></textarea>
                </div>

                <button type="submit" id="submitBtn" 
                        class="w-full bg-orange-600 text-white py-5 rounded-xl font-bold text-lg hover:bg-orange-700 transition-all shadow-lg shadow-orange-100">
                    Confirmer la réservation
                </button>
            </form>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 text-sm">
        © 2026 CookLoc Abidjan - Location Événementielle
    </footer>

    <script>
        // --- COLLE TON URL CI-DESSOUS ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwWLnYobBBiA9iVIBN8oTKY35ayoXqsvzfCOrnLnujsxEFJBZd0iNcPVt1t5MPds_eaYg/exec'
        const form = document.getElementById('contactForm')
        const btn = document.getElementById('submitBtn')

        form.addEventListener('submit', e => {
            e.preventDefault()
            
            // On change l'apparence du bouton pendant l'envoi
            btn.disabled = true
            btn.innerText = "Envoi en cours vers Google..."
            btn.style.opacity = "0.7"
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert("Génial ! Ta réservation est bien arrivée dans ton Google Sheets.")
                    form.reset()
                    btn.disabled = false
                    btn.innerText = "Confirmer la réservation"
                    btn.style.opacity = "1"
                })
                .catch(error => {
                    console.error('Erreur !', error.message)
                    alert("Oups, il y a eu un petit problème technique.")
                    btn.disabled = false
                    btn.innerText = "Réessayer"
                })
        })
    </script>

</body>
</html>
